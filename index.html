<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Heart Animation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="ui"></div>

  <script>
    const ui = document.getElementById("ui");

    const ui = document.getElementById("ui");

    function createHeart() {
      ui.innerHTML = "";

      const total = 120;

      for (let i = 0; i < total; i++) {
        const t = i / total * Math.PI * 2;

        const x = 16 * Math.pow(Math.sin(t), 3);
        const y =
          13 * Math.cos(t) -
          5 * Math.cos(2 * t) -
          2 * Math.cos(3 * t) -
          Math.cos(4 * t);

        const word = document.createElement("div");
        word.className = "love_word";
        word.innerText = "I Love You";

        const scale = 18;

        word.style.left = `calc(50% + ${x * scale}px)`;
        word.style.top = `calc(50% - ${y * scale}px)`;

        word.style.animationDelay = `${i * 0.03}s`;
        word.style.transform = `translate(-50%, -50%) rotate(${t}rad)`;

        ui.appendChild(word);
      }
    }

    createHeart();

    let zoom = 1;
    let direction = 1;

    setInterval(() => {
      zoom += direction * 0.01;

      if (zoom >= 1.08) direction = -1;
      if (zoom <= 1) direction = 1;

      ui.style.transform = `scale(${zoom})`;
    }, 30);
  </script>

</body>
</html>
